name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: asqav version
      description: Run `pip show asqav` and paste the version
      placeholder: "0.2.15"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Run `python --version` and paste the output
      placeholder: "3.11.0"
    validations:
      required: true
  - type: dropdown
    id: integration
    attributes:
      label: Integration
      description: Which integration are you using?
      options:
        - Standalone SDK
        - LangChain
        - CrewAI
        - LiteLLM
        - Haystack
        - LlamaIndex
        - smolagents
        - DSPy
        - PydanticAI
        - Dify
        - MCP
        - OpenAI Agents
        - GitHub Action
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug
      placeholder: A clear description of what the bug is
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue
      render: python
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output
      render: shell
