name: Publish
on:
  push:
    tags:
      - 'py-v*.*.*'
      - 'ts-v*.*.*'
  workflow_dispatch:

jobs:
  publish-python:
    if: startsWith(github.ref, 'refs/tags/py-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/asqav
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
        # Build the wheel directly from the source tree, not via an sdist round-trip:
        # the wheel force-includes the verifier from ../verifier (outside python/), a
        # path that does not exist inside an unpacked sdist. The package is pure Python,
        # so the wheel is universal. A follow-up can relocate the verifier under
        # src/asqav to restore the sdist.
      - run: python -m build --wheel
        working-directory: python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  publish-typescript:
    if: startsWith(github.ref, 'refs/tags/ts-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        working-directory: typescript
      - run: npm run build
        working-directory: typescript
      - run: npm publish --access public
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
